name: 领域雷达-信箱取件

on:
  schedule:
    - cron: "*/15 21-23 * * *"  # 北京时间 5:00–7:59 每 15 分钟（早高峰）
    - cron: "*/15 0-3 * * *"    # 北京时间 8:00–11:59 每 15 分钟
    - cron: "0 4-20 * * *"      # 其余时段每小时一次
  workflow_dispatch: {}          # 点完同步不想等？来这里手动 Run 一次立刻取件

permissions:
  contents: write
  issues: write

concurrency:
  group: radar-inbox
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 取出仓库
        uses: actions/checkout@v4

      - name: 准备 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 检查信箱并配音
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_INBOX_URL: ${{ secrets.NOTION_INBOX_URL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
          SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python radar_inbox.py

      - name: 提交新单集
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git pull --rebase
          git add episodes feed.xml episodes.json notion_processed.json
          git diff --cached --quiet || git commit -m "信箱取件 $(date -u +%FT%H:%M)"
          git push

      - name: 失败时自动开 Issue 提醒
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ 信箱取件失败 ${new Date().toISOString().slice(0, 16)} UTC`,
              body: [
                "这次取件配音没有成功。点开下面的链接看日志，红叉停在哪一步、报错原文是什么：",
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                "",
                "常见原因速查：Notion 40x → 集成没连接到信箱页面 / 链接不完整；MiniMax 报错 → 端点(国内/国际站)或 GroupId / 声线 ID；其他 → 把日志报错原文发给 Claude 一起排查。",
              ].join("\n"),
            });
